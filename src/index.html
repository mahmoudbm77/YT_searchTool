<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- The STYLING file  -->
    <link rel="stylesheet" href="style.css">
    <!-- The NORMALIZE file  -->
    <link rel="stylesheet" href="normalize.css">
    <title>Search Tool</title>
</head>
<body dir="ltr">

    <!-- The main DIV  -->
    <div class="mainDiv">
        <!-- The main FORM  -->
        <form action="https://www.youtube.com/results" class="mainForm">     
            <!-- The main INPUT field  -->
            <input type="text" placeholder="Search On YouTube" name="search_query" class="mainInput">
            <!-- The main SEARCH BUTTON  -->
            <button class="mainButton">Search Now</button>
        </form>
    </div>

</body>
</html>
